<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff682c" />
    <meta name="description" content="EV Charge Point Management System" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CPMS" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>CPMS — EV Charger</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </head>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #ff682c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #splash.fade {
      opacity: 0;
      pointer-events: none;
    }
    #splash svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.2));
      animation: splash-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #splash-name {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      animation: splash-pop 0.5s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #splash-sub {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      animation: splash-pop 0.5s 0.18s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes splash-pop {
      from { opacity: 0; transform: scale(0.85) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
  <body>
    <div id="splash" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="22" fill="rgba(255,255,255,0.2)"/>
        <path d="M58 12 L28 54 H50 L42 88 L72 46 H50 Z" fill="white"/>
      </svg>
      <span id="splash-name">CPMS</span>
      <span id="splash-sub">EV Charge Point</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
