services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cpms
      POSTGRES_USER:     cpms_user
      POSTGRES_PASSWORD: cpms_pass
    ports:
      - "5432:5432"
    volumes:
      - cpms_pgdata:/var/lib/postgresql/data

volumes:
  cpms_pgdata:
