services:

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""     # empty = frontend uses relative URLs via nginx proxy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cpms
      POSTGRES_USER:     cpms_user
      POSTGRES_PASSWORD: cpms_pass
    ports:
      - "5432:5432"
    volumes:
      - cpms_pgdata:/var/lib/postgresql/data

volumes:
  cpms_pgdata:
